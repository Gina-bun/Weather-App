<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search,sunny"
    />
    <link href="./output.css" rel="stylesheet" />

    <title>Weather App</title>
  </head>
  <body>
    <div class="container flex flex-col gap-3 items-center p-3">
      <div class="search flex border">
        <input type="text" id="search-input" />
        <span class="material-symbols-outlined self-end m-auto" id="search-icon"> search </span>
      </div>

      <h1 id="location"></h1>

      <img id="weather-icon" src="" class="size-65"></img>

      <p id="weather-desc"></p>
      <p id="day"></p>
      <p id="temperature"></p>
      <p id="humidity"></p>


      <script src="./script.js"></script>
    </div>
  </body>
</html>
