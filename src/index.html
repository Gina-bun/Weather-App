<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link href="./output.css" rel="stylesheet" />

    <title>Weather App</title>
  </head>
  <body class=" bg-pink-900 px-8 pt-6">
    <!-- Search input -->
     <div class="search flex border rounded-sm p-2 w-full text-gray-300" >
        <input type="text" id="search-input"  class="outline-none w-full" placeholder="search a city..."/>
        <span class="material-symbols-outlined self-end m-auto" id="search-icon"> search </span>
      </div>
      <p id="inputValidationMessage" class="text-orange-200 pl-3 text-[12px] invisible" >Please enter a city name</p>

      <!-- Weather Result -->
    <div id="weather-result" class="container flex flex-col gap-4 items-center pb-3 pt-5 h-fit text-gray-300">
     
      

      <h1 id="location" class="text-3xl font-bold"></h1>

      <h3 id="time" class="text-xl"></h3>

      <img id="weather-icon" src="" class="size-65 -mb-9 -mt-5"></img>

      <p id="weather-desc" class="text-2xl"></p>
      <p id="day" class="text-xl"></p>
      <p id="temperature" class="text-5xl"></p>

      <div class="weather-details flex justify-between gap-7 text-center">
         <p id="humidity"></p>
         <p id="pressure"></p>
         <p id="wind-speed"></p>
      </div>
     


    </div>

    <div id="skeleton" class="skeleton hidden flex-col items-center gap-4 py-3">
         <div class="skeleton-icon animate-pulse bg-gray-400 rounded w-30 h-6"></div>
         <div class="skeleton-text animate-pulse bg-gray-400 rounded-full w-40 h-40 mt-4"></div>
         <div class="skeleton-text animate-pulse bg-gray-400 rounded w-40 h-7 mt-2"></div>
         <div class="skeleton-text animate-pulse bg-gray-400 rounded w-80 h-8 mt-2"></div>
         <div class="skeleton-text animate-pulse bg-gray-400 rounded w-80 h-10 mt-2"></div>
         <div class="skeleton-text animate-pulse bg-gray-400 rounded w-80 h-8 mt-2"></div>
         <div class="skeleton-text animate-pulse bg-gray-400 rounded w-80 h-24 mt-2"></div>
    </div>

          <script src="./script.js"></script>

  </body>
</html>
