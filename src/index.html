<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search,sunny"
    />
    <link href="./output.css" rel="stylesheet" />

    <title>Weather App</title>
  </head>
  <body>
    <div class="container flex flex-col gap-3 items-center p-3">
      <div class="search flex border">
        <input type="text" />
        <span class="material-symbols-outlined self-end m-auto"> search </span>
      </div>

      <h1>Country</h1>

      <span class="material-symbols-outlined" style="font-size: 98px;"> sunny </span>

      <p>Weather</p>
      <p>Day of the week</p>
      <p>Temperature</p>
      <p>Humidity</p>

      <i data-lucide="menu" class="size-2.5"></i>

      <script src="./script.js"></script>
    </div>
  </body>
</html>
